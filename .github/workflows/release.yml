name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: apps/desktop
          tauriScript: npm run tauri

      - name: Find DMG
        id: find-dmg
        run: |
          DMG_PATH=$(find apps/desktop/src-tauri/target/release/bundle -name "*.dmg" | head -1)
          echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
          echo "Found: $DMG_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.find-dmg.outputs.dmg_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/**/*.dmg
          body: |
            ## Install on macOS

            1. Download the `.dmg` file below
            2. Open the `.dmg` and drag **meow** to Applications
            3. **Important:** The app is not code-signed, so macOS will block it. Open Terminal and run:
               ```
               xattr -cr /Applications/meow.app
               ```
            4. Now open **meow** from Applications
            5. meow will appear on your MacBook's notch — hover to expand!
